<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Paste your standard GTM Container Snippet here -->
     <title>GA4 Sandbox</title>
</head>
<body>

    <h1>My Sandbox Shop</h1>
    <button id="purchase-btn">Simulate $50 Purchase</button>

    <script>
    // This script does exactly what an eCommerce plugin does when someone clicks buy
    document.getElementById('purchase-btn').addEventListener('click', function() {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
            'event': 'purchase',
            'ecommerce': {
                'transaction_id': 'T_12345',
                'value': 50.00,
                'currency': 'USD',
                'items': [{
                    'item_name': 'Sandbox Training Guide',
                    'item_id': 'SKU_6789',
                    'price': 50.00,
                    'quantity': 1
                }]
            }
        });
        console.log('eCommerce data pushed to dataLayer!');
    });
    </script>
</body>
</html>
